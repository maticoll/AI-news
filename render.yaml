services:
  - type: web
    name: ai-news-hub
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: REFRESH_SECRET_TOKEN
        sync: false
      - key: NEWSLETTER_SENDERS
        sync: false
      - key: DATABASE_URL
        sync: false          # Set this to your Render PostgreSQL Internal Database URL
      - key: CATEGORIES_PATH
        value: ./categories.json
      - key: GMAIL_TOKEN_JSON
        sync: false
