services:
  - type: web
    name: ai-news-hub
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: REFRESH_SECRET_TOKEN
        sync: false
      - key: NEWSLETTER_SENDERS
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./ainews.db
      - key: CATEGORIES_PATH
        value: ./categories.json
      - key: GMAIL_TOKEN_JSON
        sync: false
