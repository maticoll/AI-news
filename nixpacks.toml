[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libgbm",
]

[phases.install]
cmds = [
  "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 pip install -r requirements.txt",
]

[variables]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
